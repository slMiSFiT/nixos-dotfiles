# ============================================================
#  Gruvbox Material Dark Hard — Hyprland color variables
# ============================================================

# ── Backgrounds ───────────────────────────────────────────────
$bg_hard    = rgb(1d2021)   # darkest background
$bg0        = rgb(282828)   # main background
$bg1        = rgb(32302f)
$bg2        = rgb(45403d)
$bg3        = rgb(5a524c)
$bg4        = rgb(7c6f64)   # muted / disabled

# ── Foreground ────────────────────────────────────────────────
$fg         = rgb(d4be98)   # main text
$fg0        = rgb(d4be98)
$fg1        = rgb(ddc7a1)

# ── Accent colors ─────────────────────────────────────────────
$red        = rgb(ea6962)
$orange     = rgb(e78a4e)
$yellow     = rgb(d8a657)
$green      = rgb(a9b665)
$aqua       = rgb(89b482)
$blue       = rgb(7daea3)
$purple     = rgb(d3869b)

# ── Grays ─────────────────────────────────────────────────────
$gray       = rgb(7c6f64)   # same as bg4, useful alias

# ── Transparent variants (for borders/shadows) ────────────────
$red_dim    = rgba(ea696240)
$green_dim  = rgba(a9b66540)
$blue_dim   = rgba(7daea340)
$yellow_dim = rgba(d8a65740)
