# ============================================================
#  hyprlock — Gruvbox Material Dark Hard
# ============================================================

#source = colors.conf

general {
    disable_loading_bar = true
    hide_cursor         = true
    grace               = 0
    no_fade_in          = false
    no_fade_out         = false
}

# ── Background ────────────────────────────────────────────────
background {
    monitor  =
    path     = screenshot           # blurs your actual desktop
    blur_passes   = 3
    blur_size     = 7
    noise         = 0.0117
    contrast      = 0.8916
    brightness    = 0.8172
    vibrancy      = 0.1696
    vibrancy_darkness = 0.0
}

# ── Clock ─────────────────────────────────────────────────────
label {
    monitor  =
    text     = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color    = rgba(d4be98ff)
    font_size   = 96
    font_family = JetBrainsMono Nerd Font
    shadow_passes = 2
    shadow_size   = 4
    shadow_color  = rgba(1d202180)

    position  = 0, 120
    halign    = center
    valign    = center
}

# ── Date ──────────────────────────────────────────────────────
label {
    monitor  =
    text     = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color    = rgba(d4be9899)
    font_size   = 18
    font_family = JetBrainsMono Nerd Font
    shadow_passes = 1
    shadow_size   = 2
    shadow_color  = rgba(1d202180)

    position  = 0, 40
    halign    = center
    valign    = center
}

# ── Password input box ────────────────────────────────────────
input-field {
    monitor  =
    size     = 350, 50
    outline_thickness = 2
    dots_size         = 0.28
    dots_spacing      = 0.18
    dots_center       = true
    dots_rounding     = -1

    outer_color       = rgba(5a524cff)          # bg3
    inner_color       = rgba(1d202199)          # bg_hard semi-transparent
    font_color        = rgba(d4be98ff)          # fg
    fade_on_empty     = true
    fade_timeout      = 1200
    placeholder_text  = <i><span foreground="##7c6f64">  password</span></i>

    check_color       = rgba(a9b665ff)          # green — checking
    fail_color        = rgba(ea6962ff)          # red — failed
    fail_text         = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_timeout      = 2000
    fail_transition   = 300

    capslock_color    = rgba(d8a657ff)          # yellow — caps on

    rounding          = 8
    shadow_passes     = 2
    shadow_size       = 4
    shadow_color      = rgba(1d202180)

    position          = 0, -60
    halign            = center
    valign            = center
}

# ── Hint label ────────────────────────────────────────────────
label {
    monitor  =
    text     = 
    color    = rgba(7c6f6499)
    font_size   = 14
    font_family = JetBrainsMono Nerd Font

    position  = 0, -120
    halign    = center
    valign    = center
}
