# https://wiki.hypr.land/Configuring/

# source = colors.conf

################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=eDP-1,1920x1080@60.008,auto,1.2

###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

$terminal = foot
$fileManager = foot -e yazi
$menu = fuzzel
$browser = zen-beta
$editor = nvim

#################
### AUTOSTART ###
#################

exec-once = waypaper --backend hyprpaper --restore
#exec-once = waybar
exec-once = swaync
exec-once = hypridle
exec-once = systemctl --user start hyprpolkitagent
exec-once = wl-clip-persist --clipboard both
exec-once = wl-paste --watch cliphist store
exec-once = trash-empty 30

# monitoring
#exec-once = [workspace special silent] btop
# browsing
exec-once = [workspace 1 silent] zen-beta
# workflow/todos/notes
exec-once = [ workspace 2 silent ] $terminal -e nvim ~/Sync/todos
exec-once = [workspace 2 silent] $terminal -e nvim ~/Sync/notes
# configuring/programming
exec-once= [workspace 3 silent] $terminal --working-directory ~/.nixos-config
exec-once = [workspace 3 silent] $terminal -e yazi ~/.nixos-config
# vm
#exec-once = [workspace 4 silent] virt-manager

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

### Toolkit Backend Variables ###
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
### XDG Specifications ###
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
### Qt Variables ###
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORMTHEME,qt5ct

