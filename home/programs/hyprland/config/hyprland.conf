# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true
    special_scale_factor = 0.92
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}
# See https://wiki.hypr.land/Configuring/Scrolling-Layout/
scrolling {
  #column_width = 1
}
# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
    vrr = 2
    focus_on_activate = true
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    repeat_delay = 250
    repeat_rate = 35

    touchpad {
        natural_scroll = true
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER 

# see https://wiki.hypr.land/Configuring/Binds/ for more

### Window Management ###
bind = $mainMod, Q, killactive,
bind = $mainMod Shift, Q, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod Alt, F, togglefloating,
bind = $mainMod, F, fullscreen,
bind = $mainMod, G, togglegroup,
bind = $mainMod, P, pseudo,

### Layout specific ###
bind = $mainMod, S, layoutmsg, togglesplit, # dwindle
bind = $mainMod, R, layoutmsg, colresize +conf # scrolling
bind = alt, tab, layoutmsg, cyclenext # monocle
bind = Alt Shift, Tab, layoutmsg, cycleprev # monocle

### Programs ###
bind = $mainMod, Return, exec, $terminal  zsh -c 'fastfetch; exec zsh'
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod Alt, L, exec, loginctl lock-session
bind = $mainMod Alt, B, exec, foot -T bluetui bluetui
bind = $mainMod Alt, W, exec, pkill waybar || waybar
bind = $mainMod, Slash, exec, foot -T btop btop
bind = $mainMod, N, exec, swaync-client -t -swb
bind = $mainMod Shift, N, exec, pkill gammastep || gammastep -O 4500 &

### Menus/fzf ###
bind = $mainMod, Space, exec, $menu
# TODO: maybe switch from fuzzel to fzf
# TODO: add a keybind list popup
# TODO: switch from waypaper to fzf menu with a sixel preview
bind = $mainMod, W, exec, waypaper
bind = $mainMod Alt, B, exec, bookmarks
bind = $mainMod Alt, E, exec, repos
bind = $mainMod Alt, R, exec, resources
bind = $mainMod Alt, N, exec, notes
bind = $mainMod Alt, T, exec, todos 
bind = $mainMod Alt, V, exec, cliphist wipe
bind = $mainMod, Comma, exec, rofimoji --selector fuzzel
bind = $mainMod, V, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy

### Scripts ###
bind = $mainMod, F1, exec, ~/.config/hypr/scripts/gamemode.sh
bind = , Print, exec, ~/.config/hypr/scripts/screenshot.sh --copy
bind = $mainMod, Print, exec, ~/.config/hypr/scripts/screenshot.sh --save

# Move focus with mainMod + arrow keys / + vim motion keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Window swapping
bind = $mainMod SHIFT, h, swapwindow, l
bind = $mainMod SHIFT, l, swapwindow, r
bind = $mainMod SHIFT, k, swapwindow, u
bind = $mainMod SHIFT, j, swapwindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# switch windows in tab group
bind = ALT, TAB, changegroupactive, f
bind = ALT SHIFT, TAB, changegroupactive, b

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace (scratchpad)
bind = $mainMod, Tab, togglespecialworkspace, magic
bind = $mainMod SHIFT, Tab, movetoworkspace, special:magic

# Scroll through existing workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}
# hyprctl clients

### fullscreen 
#windowrule = match:title btop, 

### floating windows ###
windowrule {
    name = center-float-menus

    match:class = menu

    size = 600 500
    float = yes
    center = yes
}
windowrule = match:class waypaper, float yes, center yes

### workspace rules ###
# browsing / communication
workspace = 1, layout:monocle, 
# terminal / notes / tasks
workspace = 2, layout:dwindle,
# coding / debugging
workspace = 3, layout:master, 
